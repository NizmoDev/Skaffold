apiVersion: apps/v1
kind: Deployment

metadata:
  name: demo
  labels: 
    app: demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: demo

  template:
    metadata:
      labels:
        app: demo

    spec:
      containers:
        - name: demo
          image: demo-app
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3000
            - containerPort: 9229

          env:
            - name: PORT
              value: "3000"

---
apiVersion: v1
kind: Service

metadata:
  name: demo-service

spec:
  selector:
    app: demo

  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000

  type: ClusterIP
